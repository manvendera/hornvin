name: hornvin_admin
description: "Hornvin Automobile Admin Panel"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  fl_chart: ^0.68.0
  syncfusion_flutter_datagrid: ^26.1.35
  file_picker: ^8.0.7
  syncfusion_flutter_pdfviewer: ^26.1.35
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  device_info_plus: ^10.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
